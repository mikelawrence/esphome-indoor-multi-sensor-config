name: CI

on:
  pull_request:
    paths:
      - "**.yml"
      - "**.yaml"
  schedule:
    # Weekly on Sunday at midnight
    - cron: "0 0 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    name: Building ${{ matrix.file }} / ${{ matrix.esphome-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        #### Modify below here to match your project ####
        file:
          - rev-b-pkg-a-c4001-esp32-s3.factory
          - rev-b-pkg-a-ld2410-esp32-s3.factory
          - rev-b-pkg-a-ld2450-esp32-s3.factory
          - rev-b-pkg-b-c4001-esp32-s3.factory
          - rev-b-pkg-b-ld2410-esp32-s3.factory
          - rev-b-pkg-b-ld2450-esp32-s3.factory
          - rev-b-pkg-a-c4001-esp32-s3
          - rev-b-pkg-a-ld2410-esp32-s3
          - rev-b-pkg-a-ld2450-esp32-s3
          - rev-b-pkg-b-c4001-esp32-s3
          - rev-b-pkg-b-ld2410-esp32-s3
          - rev-b-pkg-b-ld2450-esp32-s3
        #### Modify above here to match your project ####
        esphome-version:
          - stable
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Update reference
        run: |
          echo "Update ref: ${{ github.head_ref || github.ref_name }}"
          YAML_FILES=$(find . -type f -name '*.yaml')
          find . -type f -name '*.yaml' | while read file; do
            CHANGED=""
            CHANGED+=$(sed -i.bak 's|ref:.*$|ref: ${{ github.head_ref || github.ref_name }}|g; s|@main$|@${{ github.head_ref || github.ref_name }}|g w /dev/stdout' "$file");
            if [ "$CHANGED" != "" ]; then
              echo "Changed file: $file"
              diff "$file.bak" "$file" || true | sed 's/^/    /'
            fi
            rm "$file.bak"
          done

      - name: ESPHome ${{ matrix.esphome-version }}
        uses: esphome/build-action@v7
        with:
          yaml-file: ${{ matrix.file }}.yaml
          version: ${{ matrix.esphome-version }}
