name: Publish Firmware

on:
  workflow_run:
    workflows:
      - Create Pre-Release
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  get-release-info:
    name: Get Release Info
    runs-on: ubuntu-latest
    steps:
      - name: Get Latest Release
        id: get-latest-release
        uses: joutvhu/get-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          debug: true
          latest: true
          prerelease: true

    outputs:
      summary: ${{ steps.get-latest-release.outputs.body }}
      url: ${{ steps.get-latest-release.outputs.html_url }}
      version: ${{ steps.get-latest-release.outputs.tag_name }}

  build-firmware:
    name: Build Firmware
    needs: get-release-info
    uses: ./.github/workflows/build.yml 
    # uses: esphome/workflows/.github/workflows/build.yml@2026.4.0
    with:
      files: |
        rev-b-pkg-a-c4001-esp32-s3.factory.yaml
        rev-b-pkg-a-ld2410-esp32-s3.factory.yaml
        rev-b-pkg-a-ld2410s-esp32-s3.factory.yaml
        rev-b-pkg-a-ld2450-esp32-s3.factory.yaml
        rev-b-pkg-b-c4001-esp32-s3.factory.yaml
        rev-b-pkg-b-ld2410-esp32-s3.factory.yaml
        rev-b-pkg-b-ld2410s-esp32-s3.factory.yaml
        rev-b-pkg-b-ld2450-esp32-s3.factory.yaml
      esphome-version: latest
      release-summary: ${{ needs.get-release-info.outputs.summary }}
      release-url: ${{ needs.get-release-info.outputs.url }}
      release-version: ${{ needs.get-release-info.outputs.version }}

  rewind-pre-release:
    name: Rewind Pre-Release on Build Firmware Failure
    needs: build-firmware
    runs-on: ubuntu-latest
    if: failure()
    permissions:
      contents: write

    steps:
      - uses: ClementTsang/delete-tag-and-release@v0.4.0
        with:
          delete_release: true
          tag_name: ${{ needs.build-firmware.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-firmware:
    name: Upload Firmware
    needs: build-firmware
    uses: esphome/workflows/.github/workflows/upload-to-gh-release.yml@2026.4.1
    with:
      version: ${{ needs.build-firmware.outputs.version }}

  promote-pre-release:
    name: Promote Pre-Release to Release
    needs:
      - build-firmware
      - upload-firmware
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Promote Pre-Release to Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: ${{ needs.build-firmware.outputs.version }}
          prerelease: false
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
